upstream tornado {
    server 127.0.0.1:8000;
}

# 多层nginx的情况下，X-Scheme可能已经被设置过了，需要判断下
map $http_x_scheme $req_scheme {
    default   $http_x_scheme;
    ""        $scheme;
}

# WebSocket connection upgrade mapping
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# 【安全优化 1】通过 map 规避 location 内部的 if ( $request_uri ~* ^/get/ ) 逻辑
map $request_uri $get_expires {
    ~*^/get/    max;
    default     -1s;
}

server {
    listen 80;
    listen 443 ssl;
    http2 on;
    server_name _;

    ssl_certificate     /data/books/ssl/ssl.crt;
    ssl_certificate_key /data/books/ssl/ssl.key;

    index index.html;
    client_max_body_size 0;
    root /var/www/talebook/app/dist/;
    access_log  /data/log/nginx/talebook-access.log;
    error_log   /data/log/nginx/talebook-error.log;

    # 兼容 /opds 和 /opds/ 两种访问方式（安全，未带问号和未命名变量）
    location = /opds {
        rewrite ^ /opds/ last;
    }

    # WebDAV 服务
    location /books {
        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Depth $http_depth;
        proxy_set_header Destination $http_destination;
        proxy_set_header Overwrite $http_overwrite;
        proxy_set_header Range $http_range;
        proxy_pass_request_headers on;
        proxy_read_timeout 300;
        proxy_connect_timeout 300;
        proxy_send_timeout 300;
        expires -1s;
    }

    location /podcast {
        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        expires -1s;
    }

    location /wap {
        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_pass_request_headers on;
        expires -1s;
    }

    location ~ ^/(api|get|read|opds|auth)/ {
        expires $get_expires;

        proxy_pass       http://tornado;
        proxy_redirect   off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Scheme $req_scheme;
        proxy_set_header X-Real-IP $remote_addr;

        # WebSocket support
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_read_timeout 86400;
    }

    # Redirect Kindle browsers to the WAP interface
    location = / {
        if ($http_user_agent ~* "kindle") {
            rewrite ^ /wap last;
        }
        expires -1s;
        try_files $uri /index.html;
    }

    location = /index.html {
        expires -1s;
    }
    try_files $uri $uri/index.html /index.html;
}
